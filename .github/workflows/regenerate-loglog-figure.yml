name: Regenerate loglog figure

on:
  push:
    paths:
      - 'notebooks/loglog-illusion.ipynb'
      - 'requirements.txt'
      - '.github/workflows/regenerate-loglog-figure.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/loglog-illusion.ipynb \
            --output-dir /tmp \
            --output loglog-illusion.executed.ipynb

      - name: Commit regenerated PNG
        run: |
          if git diff --quiet -- assets/loglog_vs_linear.png; then
            echo "No changes to assets/loglog_vs_linear.png"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/loglog_vs_linear.png
          git commit -m "chore: regenerate loglog figure"
          git push
